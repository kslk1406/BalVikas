    var currentView='landing';
    var selectedGroup=-1;

    function render(){
      if(currentView==='landing')showLanding();
      else showGroup(selectedGroup);
    }

    function showLanding(){
      var hero=document.getElementById('hero');
      hero.style.display='';
      var app=document.getElementById('app');
      var html='<div class="group-cards" role="list">';
      groups.forEach(function(g,gi){
        var descParts=g.desc.match(/(.*?)\((.*?)\)/);
        var name=g.name;
        var age=descParts?descParts[2]:'';
        var desc=descParts?descParts[1].trim():g.desc;
        html+='<div class="group-card" role="listitem" tabindex="0" aria-label="'+name+' — '+g.desc+'" onclick="openGroup('+gi+')" onkeydown="if(event.key===\'Enter\')openGroup('+gi+')">';
        html+='<div class="card-name">'+name+'</div>';
        if(age)html+='<div class="card-age">'+age+'</div>';
        html+='<div class="card-desc">'+desc+'</div>';
        html+='<div class="card-explore">Explore <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg></div>';
        html+='</div>';
      });
      html+='</div>';
      app.innerHTML=html;
      app.className='container';
      window.scrollTo(0,0);
    }

    function showGroup(idx){
      var hero=document.getElementById('hero');
      hero.style.display='none';
      var g=groups[idx];
      var app=document.getElementById('app');
      var allSlokas=[];
      g.years.forEach(function(y,yi){
        y.slokas.forEach(function(s,sidx){
          allSlokas.push({sloka:s,id:idx+'-'+yi+'-'+sidx});
        });
      });
      var prevGroup=idx>0?idx-1:null;
      var nextGroup=idx<groups.length-1?idx+1:null;
      var html='';
      html+='<div style="max-width:900px;margin:0 auto;padding:16px">';
      html+='<div class="top-nav">';
      html+='<div class="top-nav-links">';
      html+='<button class="nav-link nav-home" onclick="goBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>';
      if(prevGroup!==null)html+='<button class="nav-link" onclick="openGroup('+prevGroup+')">← '+groups[prevGroup].name+'</button>';
      if(nextGroup!==null)html+='<button class="nav-link" onclick="openGroup('+nextGroup+')">'+groups[nextGroup].name+' →</button>';
      html+='</div></div>';
      html+='<div class="group-heading" style="border-top:none;padding-top:0;margin-top:0">'+g.name+' <span class="sloka-count">'+allSlokas.length+' Slokas</span></div>';
      html+='<div class="group-desc">'+g.desc+'</div>';
      g.years.forEach(function(y,yi){
        html+='<div class="year-heading">'+y.name+' - '+y.desc+'</div>';
        y.slokas.forEach(function(s,sidx){
          html+=renderSlokaCard(s,idx+'-'+yi+'-'+sidx);
        });
      });
      html+='</div>';
      app.innerHTML=html;
      app.className='';
      window.scrollTo(0,0);
      attachAllTooltips();
    }

    function openGroup(idx){
      currentView='group';
      selectedGroup=idx;
      render();
    }

    function goBack(){
      currentView='landing';
      selectedGroup=-1;
      render();
    }

    function renderSlokaCard(s,idx){
      var flatWords=[];
      s.lines.forEach(function(line){if(Array.isArray(line)){line.forEach(function(p){if(Array.isArray(p)&&typeof p[0]==='string')flatWords.push({word:p[0],meaning:p[1]});});}});
      if(flatWords.length===0){
        s.lines.forEach(function(pair){if(Array.isArray(pair)&&pair.length>=2&&typeof pair[0]==='string'&&typeof pair[1]==='string')flatWords.push({word:pair[0],meaning:pair[1]});});
      }

      var wordMap={};
      function norm(w){
        return w.toLowerCase()
          .replace(/aa/g,'a').replace(/ee/g,'i').replace(/oo/g,'u')
          .replace(/ai/g,'e').replace(/au/g,'o')
          .replace(/kh/g,'k').replace(/gh/g,'g').replace(/ch/g,'c')
          .replace(/jh/g,'j').replace(/th/g,'t').replace(/dh/g,'d')
          .replace(/ph/g,'p').replace(/bh/g,'b')
          .replace(/[^aeiou\s]/g,function(c,i,s){
            if(i===s.length-1&&(c==='n'||c==='h'||c==='m'))return '';
            return c;
          })
          .replace(/([^aeiou])\1+/g,'$1');
      }
      flatWords.forEach(function(fw){
        var key=norm(fw.word.replace(/[\s\-]+/g,''));
        if(!wordMap[key])wordMap[key]=fw.meaning;
        var parts=fw.word.toLowerCase().split(/[\s\-]+/);
        if(parts.length>1){
          parts.forEach(function(p){
            var nk=norm(p);
            if(nk&&nk.length>=2&&!wordMap[nk])wordMap[nk]=fw.meaning;
          });
        }
      });

      function findMatch(shlokaWords,startIdx){
        for(var len=Math.min(3,shlokaWords.length-startIdx);len>=1;len--){
          var concat='';
          var spaced='';
          for(var j=0;j<len;j++){
            concat+=norm(shlokaWords[startIdx+j]);
            spaced+=norm(shlokaWords[startIdx+j]);
            if(j<len-1)spaced+=' ';
          }
          if(wordMap[concat])return{meaning:wordMap[concat],count:len};
          if(wordMap[spaced])return{meaning:wordMap[spaced],count:len};
        }
        var w=norm(shlokaWords[startIdx]);
        for(var split=1;split<w.length;split++){
          var p1=w.substring(0,split);
          var p2=w.substring(split);
          if(wordMap[p1]&&wordMap[p2])return{meaning:wordMap[p1]+', '+wordMap[p2],count:1};
        }
        var keys=Object.keys(wordMap);
        var best=null;var bestLen=0;
        for(var k=0;k<keys.length;k++){
          var mk=keys[k];
          if(mk.length<2)continue;
          if(mk.indexOf(w)===0||w.indexOf(mk)===0){
            if(mk.length>bestLen){best=wordMap[mk];bestLen=mk.length;}
          }
          else if(w.length>=3&&mk.length>=3&&(w.indexOf(mk)!==-1||mk.indexOf(w)!==-1)){
            if(mk.length>bestLen){best=wordMap[mk];bestLen=mk.length;}
          }
        }
        if(best)return{meaning:best,count:1};
        return null;
      }

      var shlokaLines=s.shloka.split('\n').map(function(line){return line.trim().split(/\s+/);});
      var wordIdx=0;
      var linesHtml=shlokaLines.map(function(lineWords){
        var i=0;
        var parts=[];
        while(i<lineWords.length){
          var match=findMatch(lineWords,i);
          var c=COLORS[wordIdx%COLORS.length];wordIdx++;
          if(match){
            parts.push('<span class="tw" data-tip="'+match.meaning.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'"><span class="tw-word" style="color:'+c+';font-weight:700">'+lineWords.slice(i,i+match.count).join(' ')+'</span></span>');
            i+=match.count;
          }else{
            parts.push('<span style="font-weight:700;color:'+c+'">'+lineWords[i]+'</span>');
            i++;
          }
        }
        return parts.join(' ');
      }).join('\n');

      var aid='audio'+idx;

      var html='<div class="sloka-card">';
      html+='<div class="sloka-header"><div><div class="sloka-title">'+s.title+'</div><div class="sloka-category">'+s.category+'</div></div>';
      html+='<div class="sloka-audio">';
      html+='<button class="audio-btn" id="abtn'+aid+'" data-aid="'+aid+'" data-audio="'+s.audio.replace(/"/g,'&quot;')+'" aria-label="Play '+s.title+'"><svg viewBox="0 0 24 24" id="aicon'+aid+'"><path d="M8 5v14l11-7z"/></svg></button>';
      html+='<div class="audio-controls" id="actrl'+aid+'"><input type="range" class="audio-progress" id="aprog'+aid+'" min="0" max="100" value="0" oninput="seekSlokaAudio(\''+aid+'\',this.value)"><div class="audio-time"><span id="atime'+aid+'">0:00</span> / <span id="adur'+aid+'">0:00</span></div></div>';
      html+='</div></div>';
      html+='<div class="sloka-text">'+linesHtml+'</div>';
      html+='<div class="sloka-meaning">'+s.meaning+'</div>';
      html+='</div>';
      return html;
    }

    function formatTime(s){var m=Math.floor(s/60);var sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
    var tooltipEl=null;
    function ensureTooltip(){
      if(!tooltipEl){
        tooltipEl=document.createElement('div');
        tooltipEl.className='tooltip-bubble';
        tooltipEl.setAttribute('role','tooltip');
        document.body.appendChild(tooltipEl);
      }
    }
    function showTip(el){
      ensureTooltip();
      var tip=el.getAttribute('data-tip');
      if(!tip)return;
      tooltipEl.textContent=tip;
      tooltipEl.classList.add('show');
      var r=el.getBoundingClientRect();
      var margin=12;
      var left=r.left+r.width/2;
      var top=r.top-margin;
      tooltipEl.style.left='0px';tooltipEl.style.top='0px';
      tooltipEl.style.visibility='hidden';tooltipEl.style.opacity='0';
      tooltipEl.style.display='block';
      var tr=tooltipEl.getBoundingClientRect();
      left=Math.max(margin,Math.min(left-tr.width/2,window.innerWidth-tr.width-margin));
      if(top-tr.height<margin)top=r.bottom+margin;
      tooltipEl.style.left=left+'px';tooltipEl.style.top=(top-tr.height)+'px';
      tooltipEl.style.visibility='visible';tooltipEl.style.opacity='1';
    }
    function hideTip(){if(tooltipEl){tooltipEl.classList.remove('show');tooltipEl.style.visibility='hidden';tooltipEl.style.opacity='0';}}

    function attachAllTooltips(){
      var app=document.getElementById('app');
      if(!app)return;
      app.addEventListener('mouseenter',function(e){var w=e.target.closest('.tw');if(w)showTip(w);},true);
      app.addEventListener('mousemove',function(e){var w=e.target.closest('.tw');if(w)showTip(w);else hideTip();});
      app.addEventListener('mouseleave',function(){hideTip();},true);
      app.addEventListener('touchstart',function(e){
        var w=e.target.closest('.tw');
        if(w){e.preventDefault();e.stopPropagation();showTip(w);}
        else if(!e.target.closest('.sloka-audio'))hideTip();
      },{passive:false});
      app.addEventListener('click',function(e){
        var btn=e.target.closest('.audio-btn');
        if(btn){var aid=btn.getAttribute('data-aid');var url=btn.getAttribute('data-audio');if(url)toggleSlokaAudio(aid,url);}
      });
    }
    document.addEventListener('click',function(e){if(!e.target.closest('.sloka-audio'))hideTip();});

    function stopAllAudio(){
      Object.keys(audioInstances).forEach(function(key){
        var inst=audioInstances[key];
        if(inst&&inst.audio&&!inst.audio.paused){inst.audio.pause();inst.playing=false;updateAudioIcon(key,false);}
        if(inst&&inst.frame)cancelAnimationFrame(inst.frame);
      });
    }
    function toggleSlokaAudio(aid,audioUrl){
      if(!audioUrl||audioUrl===''){return;}
      var inst=audioInstances[aid];
      if(inst&&inst.audio&&!inst.audio.paused){inst.audio.pause();inst.playing=false;updateAudioIcon(aid,false);return;}
      if(inst&&inst.audio&&inst.audio.paused){stopAllAudio();inst.audio.play().then(function(){inst.playing=true;updateAudioIcon(aid,true);inst.frame=requestAnimationFrame(function(){syncSlokaAudio(aid);});}).catch(function(){});return;}
      stopAllAudio();
      var audio=new Audio(audioUrl);
      audio.preload='metadata';
      var ctrl=document.getElementById('actrl'+aid);
      if(ctrl)ctrl.classList.add('visible');
      audio.addEventListener('loadedmetadata',function(){
        var dur=document.getElementById('adur'+aid);if(dur)dur.textContent=formatTime(audio.duration);
        var prog=document.getElementById('aprog'+aid);if(prog)prog.max=Math.floor(audio.duration);
      });
      audio.addEventListener('ended',function(){var i=audioInstances[aid];if(i&&i.frame)cancelAnimationFrame(i.frame);updateAudioIcon(aid,false);});
      audio.addEventListener('error',function(){updateAudioIcon(aid,false);});
      audioInstances[aid]={audio:audio,playing:true,frame:null};
      updateAudioIcon(aid,true);
      audio.play().then(function(){
        audioInstances[aid].frame=requestAnimationFrame(function(){syncSlokaAudio(aid);});
      }).catch(function(){updateAudioIcon(aid,false);});
    }

    function seekSlokaAudio(aid,val){var inst=audioInstances[aid];if(inst&&inst.audio)inst.audio.currentTime=parseInt(val);}

    function syncSlokaAudio(aid){
      var inst=audioInstances[aid];if(!inst||!inst.audio||inst.audio.paused)return;
      var ct=inst.audio.currentTime;
      var prog=document.getElementById('aprog'+aid);if(prog)prog.value=Math.floor(ct);
      var tm=document.getElementById('atime'+aid);if(tm)tm.textContent=formatTime(ct);
      inst.frame=requestAnimationFrame(function(){syncSlokaAudio(aid);});
    }

    function updateAudioIcon(aid,playing){
      var icon=document.getElementById('aicon'+aid);
      if(icon){icon.innerHTML=playing?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>':'<path d="M8 5v14l11-7z"/>';}
    }

    var allSlokasFlat=[];
    groups.forEach(function(g,gi){
      g.years.forEach(function(y,yi){
        y.slokas.forEach(function(s,sidx){
          allSlokasFlat.push({sloka:s,groupIdx:gi,yearIdx:yi,slokaIdx:sidx,groupName:g.name,yearName:y.name});
        });
      });
    });

    function searchSlokas(query){
      var q=query.toLowerCase().trim();
      if(!q)return[];
      var terms=q.split(/\s+/);
      return allSlokasFlat.filter(function(item){
        var s=item.sloka;
        var haystack=(s.title+' '+s.shloka+' '+s.meaning+' '+s.category).toLowerCase();
        return terms.every(function(t){return haystack.indexOf(t)!==-1;});
      }).map(function(item){
        var s=item.sloka;
        var snippet=s.meaning.length>120?s.meaning.substring(0,120)+'...':s.meaning;
        return{title:s.title,group:item.groupName,year:item.yearName,groupIdx:item.groupIdx,snippet:snippet};
      });
    }

    var searchInput=document.getElementById('searchInput');
    var searchClear=document.getElementById('searchClear');
    var searchResults=document.getElementById('searchResults');

    searchInput.addEventListener('input',function(){
      var q=searchInput.value;
      searchClear.className='search-clear'+(q.length>0?' visible':'');
      if(!q.trim()){searchResults.innerHTML='';return;}
      var results=searchSlokas(q);
      if(results.length===0){
        searchResults.innerHTML='<div class="search-no-results">No shlokas found for "'+q.replace(/</g,'&lt;')+'"</div>';
        return;
      }
      var html='';
      results.forEach(function(r){
        html+='<div class="search-result-item" onclick="openGroup('+r.groupIdx+')" tabindex="0" onkeydown="if(event.key===\'Enter\')openGroup('+r.groupIdx+')">';
        html+='<div class="search-result-title">'+r.title+'</div>';
        html+='<div class="search-result-meta">'+r.group+' &middot; '+r.year+'</div>';
        html+='<div class="search-result-snippet">'+r.snippet.replace(/</g,'&lt;')+'</div>';
        html+='</div>';
      });
      searchResults.innerHTML=html;
    });

    searchClear.addEventListener('click',function(){
      searchInput.value='';searchClear.className='search-clear';
      searchResults.innerHTML='';searchInput.focus();
    });

    document.addEventListener('click',function(e){
      if(!e.target.closest('.search-wrap'))searchResults.innerHTML='';
    });

    render();

    var btt=document.getElementById('backToTop');
    window.addEventListener('scroll',function(){
      if(window.scrollY>400)btt.classList.add('visible');
      else btt.classList.remove('visible');
    });
    setTimeout(function(){var h=document.getElementById('themeHint');if(h){h.style.transition='opacity 0.4s';h.style.opacity='0';setTimeout(function(){h.style.display='none';},400);}},4000);
  </script>
</body>
